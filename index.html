<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secret Gallery</title>

    <script>
        const password = "0101"; 
        let input = prompt("4桁の数字パスワードを入力してください");

        if (input !== password) {
            alert("パスワードが違います。どれかのwallpaper作品に隠されてるよ!");
            location.href = "https://www.pixiv.net/dashboard/works";
        }
    </script>

    <style>
        /* --- 全体のデザイン --- */
        body {
            margin: 0;
            padding: 0;
            text-align: center;
            font-family: sans-serif;
            background-image: url("background.png"); 
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #333;
            color: #ffffff;
            -webkit-tap-highlight-color: transparent;
        }

        h1 {
            background-color: rgba(0, 0, 0, 0.6); 
            color: #7FFF00;
            padding: 20px;
            margin: 0 0 10px 0;
            font-size: 1.5rem;
            border-bottom: 3px solid #7FFF00;
        }

        /* --- ギャラリー（中央配置設定） --- */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
            padding: 10px;
            justify-content: center; 
            margin: 0 auto;
            max-width: 1200px;
        }

        @media (max-width: 600px) {
            .gallery {
                grid-template-columns: repeat(2, 160px); 
                justify-content: center;
            }
        }

        .expandable {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover; 
            cursor: pointer;
            border: 3px solid white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            transition: transform 0.2s;
            box-sizing: border-box;
            border-radius: 4px;
            background-color: #000; 
        }

        .expandable:hover { transform: scale(1.02); }

        /* --- 拡大モーダル --- */
        .modal {
            display: none;
            position: fixed;
            z-index: 9999;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.95);
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            max-width: 95vw;
            max-height: 85vh;
            width: auto;
            height: auto;
            object-fit: contain;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        .close {
            position: absolute;
            top: 10px; right: 20px;
            color: white; font-size: 50px; font-weight: bold;
            cursor: pointer;
            z-index: 10000;
            padding: 10px;
        }

        .show { display: flex !important; }
    </style>
</head>
<body>

<h1>Secret Gallery</h1>

<div class="gallery">
    <!-- 画像セクション -->
    <img src="thumb_20260316001.jpg" data-full="20260316001.png" alt="作品1" class="expandable" loading="lazy">
    <img src="thumb_20260316002.jpg" data-full="20260316002.png" alt="作品2" class="expandable" loading="lazy">
    <img src="thumb_20260316003.jpg" data-full="20260316003.png" alt="作品3" class="expandable" loading="lazy">
    <img src="thumb_20260316004.jpg" data-full="20260316004.png" alt="作品4" class="expandable" loading="lazy">
    <img src="thumb_20260316005.jpg" data-full="20260316005.png" alt="作品5" class="expandable" loading="lazy">
    <img src="thumb_20260316006.jpg" data-full="20260316006.png" alt="作品6" class="expandable" loading="lazy">
    <img src="thumb_20260316007.jpg" data-full="20260316007.png" alt="作品7" class="expandable" loading="lazy">
    <img src="thumb_20260316008.jpg" data-full="20260316008.png" alt="作品8" class="expandable" loading="lazy">
    <img src="thumb_20260316009.jpg" data-full="20260316009.png" alt="作品9" class="expandable" loading="lazy">
    <img src="thumb_20260316010.jpg" data-full="20260316010.png" alt="作品10" class="expandable" loading="lazy">
    <img src="thumb_20260316011.jpg" data-full="20260316011.png" alt="作品11" class="expandable" loading="lazy">
    <img src="thumb_20260316012.jpg" data-full="20260316012.png" alt="作品12" class="expandable" loading="lazy">
    <img src="thumb_20260316013.jpg" data-full="20260316013.png" alt="作品13" class="expandable" loading="lazy">
    <img src="thumb_20260316014.jpg" data-full="20260316014.png" alt="作品14" class="expandable" loading="lazy">
    
    <!-- 動画セクション（末尾に #t=0.1 を追加） -->
    <video src="20260316001move.mp4#t=0.1" class="expandable" muted loading="lazy" preload="metadata"></video>
    <video src="20260316002move.mp4#t=0.1" class="expandable" muted loading="lazy" preload="metadata"></video>
    <video src="20260316003move.mp4#t=0.1" class="expandable" muted loading="lazy" preload="metadata"></video>
</div>

<div id="modal" class="modal">
    <span class="close">&times;</span>
    <div id="modal-content-wrapper" style="display:contents;"></div>
</div>

<script>
    const modal = document.getElementById("modal");
    const wrapper = document.getElementById("modal-content-wrapper");

    document.querySelectorAll(".expandable").forEach(el => {
        el.onclick = function() {
            modal.classList.add("show");
            wrapper.innerHTML = ""; 

            if (this.tagName === "IMG") {
                const fullImage = this.getAttribute("data-full") || this.src;
                wrapper.innerHTML = `<img src="${fullImage}" class="modal-content">`;
            } else {
                // 再生時は #t=0.1 を除いた元のパスで再生されるように調整
                const videoSrc = this.src.split('#')[0];
                wrapper.innerHTML = `<video src="${videoSrc}" class="modal-content" controls autoplay loop playsinline></video>`;
            }
        }
    });

    modal.onclick = function() {
        modal.classList.remove("show");
        wrapper.innerHTML = "";
    }
</script>

</body>
</html>
